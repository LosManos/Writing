name: Deploy Website

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Build Kokutsu TypeScript Game
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: spel/KokutsuKoKushi/package-lock.json

      - name: Install Kokutsu dependencies
        run: npm install
        working-directory: spel/KokutsuKoKushi

      - name: Build Kokutsu
        run: npm run build
        working-directory: spel/KokutsuKoKushi

      # 2. Prepare for Jekyll
      # Copy the build output to the source directory so Jekyll includes it
      - name: Prepare Kokutsu for Jekyll
        run: |
          # Copy dist files to the source folder.
          # Note: Jekyll will then process these as static files.
          cp -r spel/KokutsuKoKushi/dist/* spel/KokutsuKoKushi/

      # 3. Build with Jekyll (includes the root site and the built game)
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
